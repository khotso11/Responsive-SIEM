          src_ip: "{src_ip}"
          node_id: "{node_id}"
          user_name: "{user}"
          duration_ms: 900000
          reason: "auth_abuse_detected"
          state_file: "auth_access_state.json"

      - name: "notify_auth_containment"
        action_type: "notify"
        reversibility: "reversible"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"

  - id: "PB-AUTH-ACCESS-RESTORE"
    version: 1
    enabled: true
    selectors:
      rule_ids:
        - "R-AUTH-ACCESS-RESTORE-REQUEST"
    policy_requirements:
      approval: "required"
      max_blast_radius: 1
      auto_min_confidence: 100
      require_identity_context: true
    steps:
