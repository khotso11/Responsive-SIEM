log_level: INFO
listen_addr: 0.0.0.0:7777

transport:
  mode: grpc_mtls
  tls:
    ca: configs/certs/ca.pem
    cert: configs/certs/master.pem
    key: configs/certs/master-key.pem
  server_name: master.local

jetstream:
  url: nats://127.0.0.1:4222
  stream: RSIEM
  subject_fast: rsiem.fast
  subject_standard: rsiem.standard
  durable_name_fast: master-fast
  durable_name_standard: master-standard

db:
  enabled: false
  dsn: "postgres://rsiem:rsiem@127.0.0.1:5432/rsiem?sslmode=disable"
  fail_closed: false
  batch_size: 200
  flush_interval_ms: 500

collectors:
  tail:
    enabled: true
    path: "tmp/demo.log"
    checkpoint_path: "tmp/tail.checkpoint.json"
    poll_ms: 200
  syslog_udp:
    enabled: true
    listen_addr: "0.0.0.0:5514"
    max_datagram_bytes: 2048
    queue_size: 1024
    read_timeout_ms: 500

export:
  enabled: true
  path: "exports/alerts.jsonl"
  include:
    alerts: true
    correlation_matches: false
  required: true
  flush: true

incidents:
  enabled: true
  max_open_incidents: 50000
  inactivity_ttl_ms: 600000
  cleanup_interval_ms: 5000
  recent_evidence_max: 10
  export:
    enabled: true
    required: true
    path: "exports/incidents.jsonl"
    flush: true

response_triggers:
  enabled: true
  # ROE consumes these
  stream: "RSIEM_RESPONSE"
  subject_fast: "rsiem.response.triggers.fast"
  subject_standard: "rsiem.response.triggers.standard"

  # If true: master-consume MUST successfully publish the trigger before ACKing the input JS msg
  required: true

  # Lane decision policy (v0)
  # If "from_alert": use the alert's lane field.
  # If "by_severity": map severity high->FAST else STANDARD.
  lane_policy: "from_alert"

roe:
  enabled: true

  jetstream:
    # Reuse existing jetstream.url unless you intentionally want a different one
    url: "nats://127.0.0.1:4222"
    stream: "RSIEM_RESPONSE"
    subject_triggers_fast: "rsiem.response.triggers.fast"
    subject_triggers_standard: "rsiem.response.triggers.standard"
    subject_steps_fast: "rsiem.response.steps.fast"
    subject_steps_standard: "rsiem.response.steps.standard"
    subject_results_fast: "rsiem.response.results.fast"
    subject_results_standard: "rsiem.response.results.standard"
    subject_approvals: "rsiem.response.approvals"
    subject_approval_requests: "rsiem.response.approval_requests"

    durable_triggers_fast: "roe-trig-fast-replay1"
    durable_triggers_standard: "roe-trig-standard-replay1"

  workers:
    fast_workers: 2
    standard_workers: 2
    pull_batch: 10
    pull_timeout_ms: 500

  dispatch_queue:
    size: 1000
    degrade_high_watermark_pct: 80
    degrade_low_watermark_pct: 50

  kv:
    bucket_idemp: "RSIEM_RSP_IDEMP"
    bucket_runs: "RSIEM_RSP_RUNS"
    bucket_steps: "RSIEM_RSP_STEPS"
    bucket_locks: "RSIEM_RSP_LOCKS"
    bucket_approvals: "RSIEM_RSP_APPROVALS"
    bucket_results: "RSIEM_RSP_RESULTS"

  # ROE v0.3 journaling / exports (JSONL)
  # Worker writes step result journal
  worker:
    notify_allow_missing_webhook: true
    export:
      enabled: true
      required: false
      steps_path: "exports/roe_steps.jsonl"
      flush: true

  # ROE writes run outcome journal
  export:
    enabled: true
    required: false
    runs_path: "exports/roe_runs.jsonl"
    flush: true
    approvals:
      enabled: false
      required: true
      path: "exports/roe_approvals.jsonl"
      flush: true

playbooks:
  - id: "PB-STAT-PROCESS-MED"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-STAT-PROCESS-MED"]
    policy_requirements:
      approval: "auto"
      max_blast_radius: 1
      auto_min_confidence: 55
    steps:
      - name: "notify_soc"
        action_type: "notify"
        reversibility: "reversible"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "global"

  - id: "PB-COUNT-PROCESS-HOST"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-COUNT-PROCESS-HOST"]
    policy_requirements:
      approval: "auto"
      max_blast_radius: 1
      auto_min_confidence: 70
    steps:
      - name: "notify_before"
        action_type: "notify"
        reversibility: "reversible"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"

      - name: "contain_host_stub"
        action_type: "agent_command"
        reversibility: "mixed"
        timeout_ms: 5000
        retries: 2
        backoff_ms: 500
        target_from: "global"
        params:
          command: "ping"
          target: "127.0.0.1"

      - name: "notify_after"
        action_type: "notify"
        reversibility: "reversible"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"

  - id: "PB-QUARANTINE-ROLLBACK-DEMO"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-COLLECT-INVALID-USER"]
    policy_requirements:
      approval: "required_for_high"
      max_blast_radius: 1
      auto_min_confidence: 85
    steps:
      - name: "quarantine_move"
        action_type: "agent_command"
        reversibility: "mixed"
        timeout_ms: 5000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"
        params:
          command: "quarantine_move"
          src_path: "tmp/demo_quarantine/file_{target_octet}.txt"
          quarantine_dir: "tmp/quarantine/{run_id}"
          dest_path: "tmp/demo_quarantine/file_{target_octet}.txt"

      - name: "quarantine_restore"
        action_type: "agent_command"
        reversibility: "reversible"
        timeout_ms: 7000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"
        params:
          command: "quarantine_restore"
          src_path: "tmp/demo_quarantine/file_{target_octet}.txt"
          quarantine_dir: "tmp/quarantine/{run_id}"
          dest_path: "tmp/demo_quarantine/file_{target_octet}.txt"
          delay_ms: 1200

  - id: "PB-AGENT-PING-LOCALHOST"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-COLLECT-INVALID-USER"]
    policy_requirements:
      approval: "required_for_high"
      max_blast_radius: 1
      auto_min_confidence: 50
    steps:
      - name: "ping_localhost"
        action_type: "agent_command"
        reversibility: "reversible"
        timeout_ms: 3000
        retries: 0
        backoff_ms: 0
        target_from: "global"
        params:
          command: "ping"
          target: "127.0.0.1"

  - id: "PB-AUTH-ABUSE-CONTAIN"
    version: 1
    enabled: true
    selectors:
      rule_ids:
        - "R-AUTH-FAILED-PW-BURST-USER"
        - "R-AUTH-FAILED-PW-BURST-SRCIP"
        - "R-AUTH-USER-SRCIP-BURST"
    policy_requirements:
      approval: "required_for_high"
      max_blast_radius: 1
      auto_max_severity: "high"
      auto_max_blast_radius: 1
      auto_min_confidence: 88
      require_approval_for_privileged: true
      require_approval_for_local_src: true
      require_identity_context: true
      default_containment_duration_ms: 900000
      max_containment_duration_ms: 1800000
    steps:
      - name: "auth_contain_src_ip"
        action_type: "agent_command"
        reversibility: "reversible"
        timeout_ms: 4000
        retries: 1
        backoff_ms: 500
        target_from: "global"
        params:
          command: "auth_contain_src_ip"
          src_ip: "{src_ip}"
          node_id: "{node_id}"
          user_name: "{user}"
          duration_ms: 900000
          reason: "auth_abuse_detected"
          state_file: "auth_access_state.json"

      - name: "auth_contain_user_access"
        action_type: "agent_command"
        reversibility: "reversible"
        timeout_ms: 4000
        retries: 1
        backoff_ms: 500
        target_from: "global"
        params:
