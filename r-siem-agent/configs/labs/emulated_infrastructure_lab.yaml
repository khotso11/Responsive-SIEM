provider:
  kind: eve_ng
  name: rsiem-eve-ng-lab
  ui_url: http://192.168.59.128/
  api_base_url: http://192.168.59.128
  api_lab_path: /R-SIEM.unl
  username_env: RSIEM_EVE_NG_USERNAME
  password_env: RSIEM_EVE_NG_PASSWORD
  allow_insecure_tls: false
  project_path: /opt/unetlab/labs/R-SIEM/
  lab_file: /opt/unetlab/labs/R-SIEM.unl
  topology_import_path: eve_ng_rsiem_infrastructure.unl
  notes: >-
    EVE-NG is the emulated lab source of truth. R-SIEM imports the lab topology file
    and overlays live incidents, telemetry, and response actions on top of it. In the
    current Ubuntu host plus VMware NAT deployment, EVE runs in a VM at 192.168.59.128
    and the R-SIEM stack remains on the host outside the emulated topology.

lab:
  id: emulated-infrastructure-v1
  description: >-
    Emulated infrastructure plane for R-SIEM using virtual routers, firewall
    gateways, switch segments, Windows and Linux endpoints, and a host-side control
    plane anchor that represents the collector endpoints reached from the EVE lab.

management_plane:
  rsiem_master:
    id: rsiem-master-01
    eve_node_name: rsiem-master-01
    hostname: rsiem-master-01
    role: management
    ip: 10.10.0.10/24
    note: >-
      Logical management anchor for the host-side R-SIEM stack. Export RSIEM_INFRA_HOST_COLLECTOR_IP
      to rewrite the collector destinations to the VMware host address reachable from the EVE VM.
    services:
      - nats-jetstream
      - master-roe
      - master-roe-worker
      - detector-v0
      - ui-api
      - ui-web
      - investigation-enricher
      - postgres-timescaledb
    collector_endpoints:
      syslog_udp: 10.10.0.10:5140
      netflow_v5: 10.10.0.10:2055
      snmp_trap: 10.10.0.10:9162

networks:
  management:
    cidr: 10.10.0.0/24
    purpose: control plane and collector destinations
  user_lan:
    cidr: 10.20.10.0/24
    purpose: user workstation segment
  server_lan:
    cidr: 10.20.20.0/24
    purpose: application and database servers
  dmz:
    cidr: 10.20.30.0/24
    purpose: exposed services and inspection targets
  red_team:
    cidr: 10.30.0.0/24
    purpose: attacker simulation segment

nodes:
  - id: edge-rtr-01
    eve_node_name: edge-rtr-01
    role: router
    mgmt_ip: 10.10.0.21/24
    data_ips:
      - 10.20.10.1/24
      - 10.20.20.1/24
      - 10.20.30.1/24
      - 10.30.0.1/24
    telemetry_exports:
      - type: syslog
        destination: 10.10.0.10:5140
      - type: snmp_trap
        destination: 10.10.0.10:9162

  - id: fw-01
    eve_node_name: fw-01
    role: firewall_gateway
    mgmt_ip: 10.10.0.22/24
    data_ips:
      - 10.20.30.254/24
      - 10.30.0.254/24
    telemetry_exports:
      - type: syslog
        destination: 10.10.0.10:5140
      - type: netflow_v5
        destination: 10.10.0.10:2055
      - type: snmp_trap
        destination: 10.10.0.10:9162

  - id: sw-core-01
    eve_node_name: sw-core-01
    role: switch_segment
    mgmt_ip: 10.10.0.23/24
    telemetry_exports:
      - type: syslog
        destination: 10.10.0.10:5140
      - type: snmp_trap
        destination: 10.10.0.10:9162

  - id: linux-endpoint-01
    eve_node_name: linux-endpoint-01
    role: managed_endpoint
    os: linux
    ip: 10.20.10.11/24
    agent_support: true
    telemetry_exports:
      - type: agent_grpc_mtls
        destination: 10.10.0.10:7777
      - type: nats
        destination: 10.10.0.10:4222
      - type: proc_net
      - type: auditd
      - type: inotify
      - type: dns

  - id: linux-endpoint-02
    eve_node_name: linux-endpoint-02
    role: managed_endpoint
    os: linux
    ip: 10.20.10.12/24
    agent_support: true
    telemetry_exports:
      - type: agent_grpc_mtls
        destination: 10.10.0.10:7777
      - type: nats
        destination: 10.10.0.10:4222
      - type: proc_net
      - type: auditd
      - type: inotify
      - type: dns

  - id: win-endpoint-01
    eve_node_name: win-endpoint-01
    role: managed_endpoint
    os: windows
    ip: 10.20.10.21/24
    agent_support: true
    telemetry_exports:
      - type: agent_grpc_mtls
        destination: 10.10.0.10:7777
      - type: nats
        destination: 10.10.0.10:4222
      - type: collector_tail
        path: C:\\ProgramData\\rsiem\\logs\\endpoint.log
    note: >-
      Windows endpoint packaging and service installation exist in the repo. Linux has been
      exercised more heavily in live tests.

  - id: app-srv-01
    eve_node_name: app-srv-01
    role: server
    os: linux
    ip: 10.20.20.11/24
    agent_support: true

  - id: db-srv-01
    eve_node_name: db-srv-01
    role: server
    os: linux
    ip: 10.20.20.12/24
    agent_support: true

  - id: dmz-srv-01
    eve_node_name: dmz-srv-01
    role: dmz_service
    os: linux
    ip: 10.20.30.11/24
    agent_support: false

  - id: attacker-01
    eve_node_name: attacker-01
    role: attacker_simulation
    os: linux
    ip: 10.30.0.11/24
    agent_support: false

links:
  - id: mgmt-core
    label: management fabric
    network: management
    endpoints: [rsiem-master-01, edge-rtr-01, fw-01, sw-core-01]
  - id: user-access
    label: user access segment
    network: user_lan
    endpoints: [edge-rtr-01, sw-core-01, linux-endpoint-01, linux-endpoint-02, win-endpoint-01]
  - id: server-access
    label: server segment
    network: server_lan
    endpoints: [edge-rtr-01, sw-core-01, app-srv-01, db-srv-01]
  - id: dmz-edge
    label: dmz edge segment
    network: dmz
    endpoints: [edge-rtr-01, fw-01, dmz-srv-01]
  - id: red-team-uplink
    label: red team uplink
    network: red_team
    endpoints: [edge-rtr-01, fw-01, attacker-01]

startup_sequence:
  - order: 1
    device_id: edge-rtr-01
    eve_node_name: edge-rtr-01
    device_type: router
    image: vios-adventerprisek9-m.SPA.159-3.M6
    boot_command: Start the router node in EVE-NG and wait for the management interface to answer on 10.10.0.21.
    validation_hint: Verify syslog and SNMP trap telemetry can be exported toward 10.10.0.10.
  - order: 2
    device_id: fw-01
    eve_node_name: fw-01
    device_type: firewall_gateway
    image: fortios.qcow2
    boot_command: Start the firewall/gateway node in EVE-NG and confirm the DMZ and red-team interfaces are up.
    validation_hint: Verify syslog, NetFlow v5, and SNMP trap exporters point at the R-SIEM management node.
  - order: 3
    device_id: sw-core-01
    eve_node_name: sw-core-01
    device_type: switch_segment
    image: iol_l2-adventerprisek9-ms
    boot_command: Start the switch node in EVE-NG and verify the user and server VLANs are active.
    validation_hint: Verify link state notifications reach the SNMP trap and syslog collectors.
  - order: 4
    device_id: linux-endpoint-01
    eve_node_name: linux-endpoint-01
    device_type: managed_endpoint
    image: ubuntu-22.04-cloudimg
    boot_command: Start linux-endpoint-01, bring up the agent and endpoint collectors, and confirm mTLS transport to the master.
    validation_hint: Verify proc_net and auditd events appear in Advanced Search.
  - order: 5
    device_id: linux-endpoint-02
    eve_node_name: linux-endpoint-02
    device_type: managed_endpoint
    image: ubuntu-22.04-cloudimg
    boot_command: Start linux-endpoint-02, join the user segment, and confirm agent registration.
    validation_hint: Verify endpoint telemetry is visible and can participate in east-west flow scan proofs.
  - order: 6
    device_id: win-endpoint-01
    eve_node_name: win-endpoint-01
    device_type: managed_endpoint
    image: windows-10-enterprise.qcow2
    boot_command: Start the Windows endpoint and verify the agent service and tail-based collector path are healthy.
    validation_hint: Verify Windows endpoint telemetry is visible even though Linux remains the more heavily tested path.
  - order: 7
    device_id: app-srv-01
    eve_node_name: app-srv-01
    device_type: server
    image: ubuntu-22.04-cloudimg
    boot_command: Start the application server and verify reachability from the user and DMZ networks.
    validation_hint: Use it as an east-west scan or service-abuse target.
  - order: 8
    device_id: db-srv-01
    eve_node_name: db-srv-01
    device_type: server
    image: ubuntu-22.04-cloudimg
    boot_command: Start the database server and confirm it is reachable only through the intended server segment path.
    validation_hint: Use it as a protected server-lan asset in scan and containment proofs.
  - order: 9
    device_id: dmz-srv-01
    eve_node_name: dmz-srv-01
    device_type: dmz_service
    image: ubuntu-22.04-cloudimg
    boot_command: Start the DMZ service node and expose the test service to the firewall path.
    validation_hint: Use it for firewall deny burst and north-south access-control proofs.
  - order: 10
    device_id: attacker-01
    eve_node_name: attacker-01
    device_type: attacker_simulation
    image: kali-linux.qcow2
    boot_command: Start the attacker node last and use it to drive the infrastructure verifier scenarios.
    validation_hint: Confirm no telemetry is expected from an agent here; evidence arrives via firewall, router, switch, and endpoint sensors.

telemetry_mapping:
  - source: device_syslog
    exporters:
      - edge-rtr-01
      - fw-01
      - sw-core-01
    collector_binary: cmd/collector-syslog/main.go
    collector_config: configs/collector-syslog.yaml
    source_type: syslog
    nats_stream: RSIEM_EVENTS
    nats_subject: rsiem.events.raw
    expected_use_cases:
      - device_login
      - firewall_deny
      - config_commit
      - route_change
      - interface_state

  - source: flow_export
    exporters:
      - fw-01
    collector_binary: cmd/collector-netflowv5/main.go
    collector_config: configs/collector-netflowv5.yaml
    source_type: netflow_v5
    nats_stream: RSIEM_EVENTS
    nats_subject: rsiem.events.raw
    expected_use_cases:
      - east_west_scan
      - dmz_connection_attempt
      - egress_beacon_pattern
      - denied_or_short_lived_flow_burst

  - source: device_trap
    exporters:
      - edge-rtr-01
      - fw-01
      - sw-core-01
    collector_binary: cmd/collector-snmptrap/main.go
    collector_config: configs/collector-snmptrap.yaml
    source_type: snmp_trap
    nats_stream: RSIEM_EVENTS
    nats_subject: rsiem.events.raw
    expected_use_cases:
      - link_down
      - link_up
      - cold_start
      - auth_failure_trap

first_six_tests:
  - id: infra-01-firewall-deny-burst
    telemetry:
      - syslog
      - netflow_v5
    initiating_node: attacker-01
    target_node: dmz-srv-01
    objective: prove blocked north-south abuse is visible on the infrastructure plane
    command_hint: ./scripts/verify_infra_firewall_deny_burst.sh
    expected_rule_id: R-INFRA-FIREWALL-DENY-BURST
    search_pivot: category:infrastructure rule_id:R-INFRA-FIREWALL-DENY-BURST

  - id: infra-02-east-west-scan
    telemetry:
      - netflow_v5
      - syslog
    initiating_node: linux-endpoint-01
    target_segment: server_lan
    objective: correlate internal scanning with flow evidence and, if managed, endpoint evidence
    command_hint: ./scripts/verify_infra_east_west_flow_scan.sh
    expected_rule_id: R-INFRA-EAST-WEST-FLOW-SCAN
    search_pivot: category:infrastructure rule_id:R-INFRA-EAST-WEST-FLOW-SCAN

  - id: infra-03-network-admin-login
    telemetry:
      - syslog
    initiating_node: attacker-01
    target_node: edge-rtr-01
    objective: prove device management-plane access is observable
    command_hint: ./scripts/verify_infra_network_admin_login.sh
    expected_rule_id: R-INFRA-NETWORK-ADMIN-LOGIN
    search_pivot: category:infrastructure rule_id:R-INFRA-NETWORK-ADMIN-LOGIN

  - id: infra-04-link-flap-or-linkdown
    telemetry:
      - snmp_trap
      - syslog
    initiating_node: sw-core-01
    objective: prove infrastructure health events are ingested and can be promoted to incidents
    command_hint: ./scripts/verify_infra_link_flap_burst.sh
    expected_rule_id: R-INFRA-LINK-FLAP-BURST
    search_pivot: category:infrastructure rule_id:R-INFRA-LINK-FLAP-BURST

  - id: infra-05-firewall-config-change
    telemetry:
      - syslog
    initiating_node: fw-01
    objective: prove configuration governance events are visible to R-SIEM
    command_hint: ./scripts/verify_infra_firewall_config_change_oow.sh
    expected_rule_id: R-INFRA-FIREWALL-CONFIG-CHANGE-OOW
    search_pivot: category:infrastructure rule_id:R-INFRA-FIREWALL-CONFIG-CHANGE-OOW

  - id: infra-06-domain-or-destination-block-verification
    telemetry:
      - dns
      - proc_net
      - syslog
      - netflow_v5
    initiating_node: linux-endpoint-01
    target_node: fw-01
    objective: prove before-during-after verification for an enforced block action
    command_hint: ./scripts/verify_infra_post_containment_block_verification.sh
    expected_rule_id: R-INFRA-POST-CONTAINMENT-BLOCK-VERIFY
    search_pivot: category:infrastructure rule_id:R-INFRA-POST-CONTAINMENT-BLOCK-VERIFY
