    steps:
      - name: "detector_self_protect"
        action_type: "agent_command"
        reversibility: "reversible"
        timeout_ms: 3000
        retries: 0
        backoff_ms: 0
        target_from: "global"
        params:
          command: "detector_self_protect"
          marker_file: "self_protect.txt"

policies:
  safe_mode:
    enabled: true
    # When ROE is degraded, require approvals more aggressively
    require_approval_when_degraded: true
    rules:
      - id: "safe_mode_degraded"
        when:
          degraded: true
        apply:
          require_approval_when_degraded: true

  approvals:
    # Approval modes supported by playbooks:
    # - auto: never require approval unless ROE is degraded
    # - required: always require approval
    # - required_for_high: require approval for high/critical severity
    # - required_for_critical: require approval only for critical severity
    #
    # Optional playbook policy overrides:
    # - auto_max_severity: auto-run if severity <= this level
    # - auto_max_blast_radius: auto-run only if max_blast_radius <= this value
    # - auto_min_confidence: minimum confidence score for autonomous action
    #
    # Step metadata:
    # - reversibility: reversible | mixed | irreversible
    #
    # This lets R-SIEM auto-contain low-blast-radius, reversible cases while
    # keeping disruptive actions under human control.
    #
    # If approval is required, how long we wait before failing safe
    timeout_ms: 300000
    default_auto_min_confidence: 70
    rules:
      - id: "safe_mode_degraded"
        when:
          degraded: true
        decision:
          required: true
          reason: "safe_mode:degraded"
      - id: "irreversible_action"
        when:
          reversibility_in: ["irreversible"]
        decision:
          required: true
          reason: "policy:irreversible_action"
      - id: "critical_asset_review"
        when:
          asset_criticality_in: ["critical"]
        decision:
          required: true
          reason: "policy:critical_asset"
      - id: "service_account_review"
        when:
          identity_service_account: true
        decision:
          required: true
          reason: "policy:service_account"
      - id: "privileged_identity_review"
        when:
          privileged_escalation_eligible: true
        decision:
          required: true
          reason: "policy:privileged_identity"
      - id: "local_source_review"
        when:
          local_source_escalation_eligible: true
        decision:
          required: true
          reason: "policy:local_source"
      - id: "auto_within_bounds"
        when:
          auto_bounds_defined: true
          confidence_at_least_floor: true
          severity_within_auto_max: true
          blast_radius_within_auto_max: true
        decision:
          required: false
          reason: "policy:auto_within_bounds"
      - id: "required_always"
        when:
          mode_in: ["required"]
        decision:
          required: true
          reason: "policy:required"
      - id: "required_for_high_by_severity"
        when:
          mode_in: ["required_for_high"]
          severity_gte: "high"
        decision:
          required: true
          reason: "policy:severity>=high"
      - id: "required_for_high_low_confidence"
        when:
          mode_in: ["required_for_high"]
          confidence_below_floor: true
        decision:
          required: true
          reason: "policy:confidence_below_threshold"
      - id: "required_for_high_auto_path"
        when:
          mode_in: ["required_for_high"]
        decision:
          required: false
          reason: "policy:auto_below_high"
      - id: "required_for_critical_by_severity"
        when:
          mode_in: ["required_for_critical"]
          severity_gte: "critical"
        decision:
          required: true
          reason: "policy:severity>=critical"
      - id: "required_for_critical_low_confidence"
        when:
          mode_in: ["required_for_critical"]
          confidence_below_floor: true
        decision:
          required: true
          reason: "policy:confidence_below_threshold"
      - id: "required_for_critical_auto_path"
        when:
          mode_in: ["required_for_critical"]
        decision:
          required: false
          reason: "policy:auto_below_critical"
      - id: "auto_low_confidence_fails_safe"
        when:
          mode_in: ["auto"]
          confidence_below_floor: true
        decision:
          required: true
          reason: "policy:auto_confidence_below_threshold"
      - id: "auto_default"
        when:
          mode_in: ["auto"]
        decision:
          required: false
          reason: "policy:auto"
      - id: "unknown_mode_fail_safe"
        decision:
          required: true
          reason: "policy:unknown_mode_fail_safe"

