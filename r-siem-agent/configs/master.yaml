log_level: INFO
listen_addr: 0.0.0.0:7777

transport:
  mode: grpc_mtls
  tls:
    ca: configs/certs/ca.pem
    cert: configs/certs/master.pem
    key: configs/certs/master-key.pem
  server_name: master.local

jetstream:
  url: nats://127.0.0.1:4222
  stream: RSIEM
  subject_fast: rsiem.fast
  subject_standard: rsiem.standard
  durable_name_fast: master-fast
  durable_name_standard: master-standard

collectors:
  tail:
    enabled: true
    path: "tmp/demo.log"
    checkpoint_path: "tmp/tail.checkpoint.json"
    poll_ms: 200
  syslog_udp:
    enabled: true
    listen_addr: "0.0.0.0:5514"
    max_datagram_bytes: 2048
    queue_size: 1024
    read_timeout_ms: 500

export:
  enabled: true
  path: "exports/alerts.jsonl"
  include:
    alerts: true
    correlation_matches: false
  required: true
  flush: true

incidents:
  enabled: true
  max_open_incidents: 50000
  inactivity_ttl_ms: 600000
  cleanup_interval_ms: 5000
  recent_evidence_max: 10
  export:
    enabled: true
    required: true
    path: "exports/incidents.jsonl"
    flush: true

response_triggers:
  enabled: true
  # ROE consumes these
  stream: "RSIEM_RESPONSE"
  subject_fast: "rsiem.response.triggers.fast"
  subject_standard: "rsiem.response.triggers.standard"

  # If true: master-consume MUST successfully publish the trigger before ACKing the input JS msg
  required: true

  # Lane decision policy (v0)
  # If "from_alert": use the alert's lane field.
  # If "by_severity": map severity high->FAST else STANDARD.
  lane_policy: "from_alert"

roe:
  enabled: true

  jetstream:
    # Reuse existing jetstream.url unless you intentionally want a different one
    url: "nats://127.0.0.1:4222"
    stream: "RSIEM_RESPONSE"
    subject_triggers_fast: "rsiem.response.triggers.fast"
    subject_triggers_standard: "rsiem.response.triggers.standard"
    subject_steps_fast: "rsiem.response.steps.fast"
    subject_steps_standard: "rsiem.response.steps.standard"
    subject_results_fast: "rsiem.response.results.fast"
    subject_results_standard: "rsiem.response.results.standard"
    subject_approvals: "rsiem.response.approvals"
    subject_approval_requests: "rsiem.response.approval_requests"

    durable_triggers_fast: "roe-trig-fast-replay1"
    durable_triggers_standard: "roe-trig-standard-replay1"

  workers:
    fast_workers: 2
    standard_workers: 2
    pull_batch: 10
    pull_timeout_ms: 500

  dispatch_queue:
    size: 1000
    degrade_high_watermark_pct: 80
    degrade_low_watermark_pct: 50

  kv:
    bucket_idemp: "RSIEM_RSP_IDEMP"
    bucket_runs: "RSIEM_RSP_RUNS"
    bucket_steps: "RSIEM_RSP_STEPS"
    bucket_locks: "RSIEM_RSP_LOCKS"
    bucket_approvals: "RSIEM_RSP_APPROVALS"
    bucket_results: "RSIEM_RSP_RESULTS"

  # ROE v0.3 journaling / exports (JSONL)
  # Worker writes step result journal
  worker:
    notify_allow_missing_webhook: true
    export:
      enabled: true
      required: false
      steps_path: "exports/roe_steps.jsonl"
      flush: true

  # ROE writes run outcome journal
  export:
    enabled: true
    required: false
    runs_path: "exports/roe_runs.jsonl"
    flush: true
    approvals:
      enabled: false
      required: true
      path: "exports/roe_approvals.jsonl"
      flush: true

playbooks:
  - id: "PB-STAT-PROCESS-MED"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-STAT-PROCESS-MED"]
    policy_requirements:
      approval: "auto"
      max_blast_radius: 1
    steps:
      - name: "notify_soc"
        action_type: "notify"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "global"

  - id: "PB-COUNT-PROCESS-HOST"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-COUNT-PROCESS-HOST"]
    policy_requirements:
      approval: "auto"
      max_blast_radius: 1
    steps:
      - name: "notify_before"
        action_type: "notify"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"

      - name: "contain_host_stub"
        action_type: "agent_command"
        timeout_ms: 5000
        retries: 2
        backoff_ms: 500
        target_from: "global"
        params:
          command: "ping"
          target: "127.0.0.1"

      - name: "notify_after"
        action_type: "notify"
        timeout_ms: 2000
        retries: 0
        backoff_ms: 0
        target_from: "group_key"

  - id: "PB-AGENT-PING-LOCALHOST"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-COLLECT-INVALID-USER"]
    policy_requirements:
      approval: "required_for_high"
      max_blast_radius: 1
    steps:
      - name: "ping_localhost"
        action_type: "agent_command"
        timeout_ms: 3000
        retries: 0
        backoff_ms: 0
        target_from: "global"
        params:
          command: "ping"
          target: "127.0.0.1"

  - id: "PB-SEQ-PROCESS-TO-NET"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-SEQ-PROCESS-TO-NET", "R-COLLECT-FAILED-PW", "R-COLLECT-INVALID-USER", "R-COUNT-FAILED-PW-SRCIP"]
    policy_requirements:
      approval: "required_for_high"
      max_blast_radius: 1
    steps:
      - name: "block_egress_stub"
        action_type: "network_block"
        timeout_ms: 5000
        retries: 2
        backoff_ms: 500
        target_from: "group_key"   # host

  - id: "PB-JOIN-HIGH-NET"
    version: 1
    enabled: true
    selectors:
      rule_ids: ["R-JOIN-HIGH-NET"]
    policy_requirements:
      approval: "required_for_high"
      max_blast_radius: 3
    steps:
      - name: "rate_limit_src_ip_stub"
        action_type: "network_rate_limit"
        timeout_ms: 5000
        retries: 2
        backoff_ms: 500
        target_from: "group_key"   # src_ip

policies:
  safe_mode:
    enabled: true
    # When ROE is degraded, require approvals more aggressively
    require_approval_when_degraded: true

  approvals:
    # If approval is required, how long we wait before failing safe
    timeout_ms: 300000

  blast_radius:
    default_max: 1

  action_allowlist:
    # v0.1: planning only (no real connectors yet)
    allowed_action_types:
      - "notify"
      - "agent_command"
      - "network_block"
      - "network_rate_limit"

consumer:
  fast_workers: 1
  standard_workers: 1
  pull_batch: 10
  pull_timeout_ms: 500

pipeline:
  trigger_dedupe:
    enabled: true
    ttl_ms: 600000
    max_keys: 200000
  cooldown:
    enabled: true
    window_ms: 60000
    max_keys: 50000
    persist:
      enabled: true
      path: "tmp/cooldown.checkpoint.json"
      flush_interval_ms: 1000
    per_rule:
      - rule_id: "R-COLLECT-FAILED-PW"
        window_ms: 2000
      - rule_id: "R-SEQ-PROCESS-TO-NET"
        window_ms: 300000

ack_delay_ms: 0
ack_drop_rate: 0.0

rce:
  enabled: true
  dispatch:
    max_queue: 1024
    degrade_high_watermark_pct: 80
  guardrails:
    max_event_size_bytes: 65536
    max_clock_skew_ms: 86400000
  state:
    ttl_ms: 300000
    max_keys_per_rule: 50000
    cleanup_interval_ms: 5000
  suppression:
    default_cooldown_ms: 60000
  rules:
    - id: R-STAT-PROCESS-MED
      enabled: true
      kind: stateless
      severity: medium
      when:
        type: process
        fields:
          severity: medium

    - id: R-COUNT-PROCESS-HOST
      enabled: true
      kind: count
      severity: high
      group_by: host
      window_ms: 60000
      threshold: 3
      when:
        type: process

    - id: R-COLLECT-FAILED-PW
      enabled: true
      kind: trigger
      severity: high
      group_by: src_ip
      when:
        type: auth
        fields:
          message_contains: "Failed password"

    - id: R-COLLECT-INVALID-USER
      enabled: true
      kind: trigger
      severity: high
      group_by: src_ip
      when:
        type: auth
        fields:
          message_contains: "Invalid user"

    - id: R-COUNT-FAILED-PW-SRCIP
      enabled: true
      kind: count
      severity: high
      group_by: src_ip
      window_ms: 60000
      threshold: 5
      when:
        type: auth
        fields:
          message_contains: "Failed password"

    - id: R-SEQ-PROCESS-TO-NET
      enabled: true
      kind: sequence
      severity: high
      group_by: host
      window_ms: 120000
      steps:
        - type: process
        - type: network

    - id: R-JOIN-HIGH-NET
      enabled: true
      kind: join
      severity: high
      group_by: src_ip
      window_ms: 300000
      predicates:
        - type: network
          fields:
            severity: high
        - type: network
